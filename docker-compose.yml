services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: synchub
      POSTGRES_PASSWORD: synchub_dev
      POSTGRES_DB: synchub
    ports:
      - '5432:5432'
    volumes:
      - 'pg_data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U synchub -d synchub']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://synchub:synchub_dev@postgres:5432/synchub
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
